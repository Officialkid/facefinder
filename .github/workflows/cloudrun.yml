name: Build and Deploy FaceFinder

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID != '' && secrets.GCP_PROJECT_ID || 'facefinder-prod' }}
      REGION: ${{ secrets.GCP_REGION != '' && secrets.GCP_REGION || 'us-central1' }}
      SERVICE_NAME: ${{ secrets.CLOUD_RUN_SERVICE != '' && secrets.CLOUD_RUN_SERVICE || 'facefinder-api' }}
      REPOSITORY: ${{ secrets.GAR_REPOSITORY != '' && secrets.GAR_REPOSITORY || 'facefinder' }}
      IMAGE_NAME: facefinder-backend
      CLOUD_RUN_DEPLOY: ${{ secrets.CLOUD_RUN_DEPLOY != '' && secrets.CLOUD_RUN_DEPLOY || 'true' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || 'projects/385300455062/locations/global/workloadIdentityPools/github-pool/providers/github-provider' }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT != '' && secrets.GCP_SERVICE_ACCOUNT || 'github-deployer@facefinder-prod.iam.gserviceaccount.com' }}
      GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate auth configuration
        id: validate_auth
        run: |
          if [ -n "${{ env.GCP_CREDENTIALS_JSON }}" ] && [ -n "${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "Error: Set only one auth method: either GCP_CREDENTIALS_JSON OR (GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT)."
            exit 1
          fi

          if [ -n "${{ env.GCP_CREDENTIALS_JSON }}" ]; then
            echo "Using credentials_json authentication."
            echo "workload_identity_provider=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && [ -n "${{ env.GCP_SERVICE_ACCOUNT }}" ]; then
            provider="${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
            provider="${provider#//iam.googleapis.com/}"

            if [[ ! "$provider" =~ ^projects/[0-9]+/locations/global/workloadIdentityPools/[^/]+/providers/[^/]+$ ]]; then
              echo "Error: GCP_WORKLOAD_IDENTITY_PROVIDER must be in format 'projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID'."
              exit 1
            fi

            echo "workload_identity_provider=$provider" >> "$GITHUB_OUTPUT"
            echo "Using workload identity provider authentication."
            exit 0
          fi

          echo "Error: Missing auth secrets. Provide either GCP_CREDENTIALS_JSON or both GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT."
          exit 1

      - name: Authenticate to Google Cloud (Workload Identity)
        if: ${{ env.GCP_CREDENTIALS_JSON == '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.validate_auth.outputs.workload_identity_provider }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Credentials JSON)
        if: ${{ env.GCP_CREDENTIALS_JSON != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        if: ${{ env.CLOUD_RUN_DEPLOY == 'true' }}
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $IMAGE_URI \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8000 \
            --memory 2Gi \
            --timeout 900 \
            --min-instances 0 \
            --max-instances 5
